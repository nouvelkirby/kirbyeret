<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nouvel Kirby | Visual Artist & Future Engineer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        /* --- ELEGANT MINIMALIST BLACK, GRAY & WHITE DESIGN (CSS) --- */
        
        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #F5F5F7; /* Apple-inspired premium light gray background */
            margin: 0; padding: 0; color: #333;
            letter-spacing: -0.01em;
        }

        header { 
            text-align: center; padding: 80px 20px 40px; 
            background: #FFFFFF; border-bottom: 1px solid #EAEAEA;
        }
        header h1 { 
            font-family: 'Playfair Display', serif;
            margin: 0; font-size: 3rem; letter-spacing: -2px; color: #111;
        }
        header p { 
            color: #888; margin-top: 10px; text-transform: uppercase; letter-spacing: 3px; font-size: 0.75rem; font-weight: 500;
        }

        /* ARTIST BIO SECTION (Pinaliit, Hinati, may Gray Ring) */
        .bio-container {
            max-width: 1000px; margin: 40px auto; padding: 40px;
            background: #FFFFFF; border-radius: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.02);
            border: 1px solid #F0F0F0;
            display: flex; flex-direction: column; align-items: center; gap: 30px;
            opacity: 0; transition: opacity 0.8s ease;
        }
        .bio-container.loaded { opacity: 1; }

        /* Maliit na PFP na may GRAY RING */
        .bio-pic-wrapper {
            position: relative;
            width: 110px; height: 110px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
        }
        /* Eto yung gray ring (outline) sa labas */
        .bio-pic-wrapper::before {
            content: '';
            position: absolute;
            top: -5px; left: -5px; right: -5px; bottom: -5px;
            border-radius: 50%;
            border: 1px solid #CCCCCC; /* Gray Ring Color */
            z-index: 1;
        }
        
        .bio-pic {
            width: 100px; height: 100px; border-radius: 50%;
            object-fit: cover; 
            position: relative;
            z-index: 2; /* Papatong sa ring */
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        /* Hati sa Bio at Contact */
        .bio-content-flex {
            display: flex; width: 100%; gap: 40px; align-items: start;
        }

        /* Kaliwa: Bio Text */
        .bio-text-block { flex: 1.5; }
        .bio-text-block h2 { 
            margin: 0 0 20px; font-size: 1.8rem; color: #111; font-weight: 600; 
            font-family: 'Playfair Display', serif;
        }
        .bio-text-block p { 
            color: #555; line-height: 1.7; margin: 0; font-size: 0.95rem; 
            text-align: justify; white-space: pre-line;
        }

        /* VERITICAL DIVIDER */
        .vertical-divider {
            width: 1px; background-color: #EAEAEA; align-self: stretch;
        }

        /* Kanan: Contact Info */
        .contact-block { flex: 1; }
        .contact-block h3 { 
            margin: 0 0 20px; font-size: 1.2rem; color: #111; font-weight: 600; 
            text-transform: uppercase; letter-spacing: 2px;
        }
        .contact-block p { color: #666; font-size: 0.9rem; line-height: 1.6; margin: 0 0 15px; }
        .contact-link { display: block; color: #111; text-decoration: none; font-weight: 500; margin-bottom: 8px; }
        .contact-link:hover { text-decoration: underline; }

        /* Mobile adaptation for bio */
        @media (max-width: 768px) {
            .bio-container { padding: 30px; margin: 20px; }
            .bio-content-flex { flex-direction: column; gap: 30px; }
            .vertical-divider { width: 100%; height: 1px; }
            .bio-text-block h2, .contact-block h3 { text-align: center; }
            .bio-text-block p { text-align: center; }
            .contact-block { text-align: center; }
        }

        /* THE GALLERY */
        .gallery-title { text-align: center; margin-top: 60px; font-size: 0.9rem; font-weight: 600; text-transform: uppercase; letter-spacing: 4px; color: #AAAAAA; }
        
        .gallery-container {
            max-width: 1200px; margin: 30px auto 60px; padding: 0 20px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 40px;
            align-items: start; /* Sinisiguro nito na hindi hihilahin yung cards pababa */
        }
        @media (max-width: 992px) { .gallery-container { grid-template-columns: repeat(2, 1fr); gap: 30px; } }
        @media (max-width: 600px) { .gallery-container { grid-template-columns: 1fr; gap: 20px; } }

        /* Art Card (Naka-angat, Full Image preview) */
        .art-card {
            background: #FFFFFF; border-radius: 15px; overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03); /* Subtle initial shadow */
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            cursor: pointer;
            border: 1px solid #F0F0F0;
        }
        
        /* Hover Effect: Mas aangat at mas matingkad na shadow */
        .art-card:hover { transform: translateY(-10px); box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
        
        /* FULL IMAGE PREVIEW SETTINGS (contain) */
        .art-card img { 
            width: 100%; height: auto; /* Uses image's natural height */
            max-height: 500px; /* Limits portrait image height */
            object-fit: contain; /* Shows full image, no cropping */
            background-color: #FBFBFB; /* Very subtle gray background for non-square images */
            display: block; transition: all 0.4s ease;
        }
        
        .art-info { padding: 30px; text-align: left; }
        .art-info h3 { 
            margin: 0; font-size: 1.4rem; font-weight: 600; color: #111; 
            font-family: 'Playfair Display', serif;
        }
        .art-info p { margin: 10px 0 0; color: #AAAAAA; font-size: 0.85rem; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; }

        /* MODAL POPUP */
        #modal-overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.92); z-index: 1000; backdrop-filter: blur(15px);
        }

        #art-modal {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 95%; max-width: 1100px; background: #FFFFFF; z-index: 1001;
            border-radius: 30px; overflow: hidden; animation: fadeInModal 0.5s ease;
        }

        @keyframes fadeInModal { from { opacity: 0; transform: translate(-50%, -48%); } to { opacity: 1; transform: translate(-50%, -50%); } }

        .modal-content { display: flex; flex-wrap: wrap; }
        .modal-left { flex: 1.4; min-width: 300px; background: #000; display: flex; align-items: center; justify-content: center; }
        .modal-left img { width: 100%; max-height: 85vh; object-fit: contain; padding: 20px; }
        
        .modal-right { flex: 1; padding: 60px; min-width: 300px; position: relative; display: flex; flex-direction: column; justify-content: center; }

        .status-badge { 
            display: inline-block; padding: 8px 18px; border-radius: 50px; 
            font-size: 0.7rem; font-weight: 700; text-transform: uppercase; margin-bottom: 25px; align-self: flex-start;
        }
        .available { background: #E6FFFA; color: #065F46; }
        .sold { background: #FFF5F5; color: #991B1B; }

        .close-btn { 
            position: absolute; top: 30px; right: 30px; background: none; border: none; 
            font-size: 2rem; cursor: pointer; color: #CCCCCC; transition: color 0.2s; font-weight: 300;
        }
        .close-btn:hover { color: #111; }
    </style>
</head>
<body>

    <header>
        <h1>Nouvel Kirby</h1>
        <p>Visual Artist & Future Engineer</p>
    </header>

    <div class="bio-container" id="bio-container">
        </div>

    <div class="gallery-title">The Gallery</div>

    <div class="gallery-container" id="main-gallery">
        </div>

    <div id="modal-overlay" onclick="closeModal()"></div>
    <div id="art-modal">
        <button class="close-btn" onclick="closeModal()">✕</button>
        <div class="modal-content">
            <div class="modal-left">
                <img id="modal-img" src="" alt="Full Artwork">
            </div>
            <div class="modal-right">
                <div id="modal-status" class="status-badge"></div>
                <h2 id="modal-title" style="margin:0; font-family: 'Playfair Display', serif; font-size: 2.5rem; letter-spacing: -1px;"></h2>
                <p id="modal-desc" style="color: #666; line-height: 1.8; margin: 30px 0; font-size: 1.05rem; white-space: pre-line;"></p>
                <hr style="border:0; border-top: 1px solid #eee; margin-bottom: 20px;">
                <h3 id="modal-price" style="font-size: 1.8rem; color: #111; margin: 0;"></h3>
            </div>
        </div>
    </div>

    <script>
        /* --- DYNAMIC PROFILE DATA (Edit Profile & Contact here!) --- */
        const artistProfile = {
            profilePic: "profile.jpg", // <--- Pangalan ng file mo dapat ay 'profile.jpg'
            title: "About Nouvel Kirby",
            bio: `He is a student at Lyceum of Subic Bay, Inc. whose love for art began in junior high through the Special Program in the Arts at Subic National High School. He works mainly with graphite, charcoal, and acrylics.

            Over the years, he has accepted art commissions to buy his own materials, allowing him to keep practicing, improving, and challenging himself.

            For Nouvel, art is more than just creating something nice to look at — it's about showing emotions and telling stories in every piece. He is dedicated to growing as an artist and making works that connect with people.`,
            
            // CONTACT INFO SECTION
            contactTitle: "Contact for Commissions",
            contactText: "Interested in a piece or a custom artwork? Feel free to reach out directly through any of the channels below:",
            gmail: "gumisadshin@gmail.com",
            facebook: "Nouvel Kirby",
            facebookUrl: "https://www.facebook.com/nouvel.kirby", // <--- PALITAN MO ITO NG FACEBOOK PROFILE URL MO
            number: "+639707858237" // <--- Updated: WhatsApp format
        };

        /* --- DYNAMIC ART DATA (Edit/Insert Artwork here) --- */
        const myArtworks = [
            {
                title: "A Sovereign Lady",
                price: "P10,000",
                description: "A detailed portrait focusing on the grace and strength of the subject.",
                status: "Available",
                image: "art1.jpg" // Make sure this matches your file in 'images' folder
            },
            {
                title: "Charcoal Study",
                price: "Sold",
                description: "Experimental brushwork mimicking water and sand textures.",
                status: "Sold",
                image: "art2.jpg"
            },
            {
                title: "Emotional Reflection",
                price: "Sold",
                description: "Description of your third art here...",
                status: "Sold",
                image: "art3.jpg"
            }
            // Add more blocks like the one above to add new art!
        ];

        /* --- LOGIC (Do not change) --- */
        
        // 1. Load Profile & Contact
        const bioContainer = document.getElementById('bio-container');
        bioContainer.innerHTML = `
            <div class="bio-pic-wrapper">
                <img src="${artistProfile.profilePic}" alt="Artist Profile" class="bio-pic">
            </div>
            <div class="bio-content-flex">
                <div class="bio-text-block">
                    <h2>${artistProfile.title}</h2>
                    <p>${artistProfile.bio}</p>
                </div>
                <div class="vertical-divider"></div>
                <div class="contact-block">
                    <h3>${artistProfile.contactTitle}</h3>
                    <p>${artistProfile.contactText}</p>
                    <a href="mailto:${artistProfile.gmail}" class="contact-link">Email: ${artistProfile.gmail}</a>
                    <a href="${artistProfile.facebookUrl}" target="_blank" class="contact-link">Facebook: ${artistProfile.facebook}</a>
                    <p class="contact-link" style="text-decoration: none;">Whatsapp: ${artistProfile.number}</p>
                </div>
            </div>
        `;
        bioContainer.classList.add('loaded'); // Show the bio-section smoothly

        // 2. Load Gallery
        const gallery = document.getElementById('main-gallery');

        myArtworks.forEach((art, index) => {
            gallery.innerHTML += `
                <div class="art-card" onclick="openModal(${index})">
                    <img src="${art.image}" alt="${art.title}">
                    <div class="art-info">
                        <h3>${art.title}</h3>
                        <p>${art.status}</p>
                    </div>
                </div>
            `;
        });

        // 3. Modal Functionality
        function openModal(index) {
            const art = myArtworks[index];
            document.getElementById('modal-title').innerText = art.title;
            document.getElementById('modal-desc').innerText = art.description;
            document.getElementById('modal-price').innerText = "Price: " + art.price;
            document.getElementById('modal-img').src = art.image;
            
            const statusBadge = document.getElementById('modal-status');
            statusBadge.innerText = art.status;
            statusBadge.className = "status-badge " + art.status.toLowerCase();

            document.getElementById('modal-overlay').style.display = 'block';
            document.getElementById('art-modal').style.display = 'block';
        }

        function closeModal() {
            document.getElementById('modal-overlay').style.display = 'none';
            document.getElementById('art-modal').style.display = 'none';
        }
    </script>
</body>
</html>
